    <script>

      

      // ======================== Button #1
      var mem1Count = 0;
      $("#mem1-button").click(function () {

         
        if (mem1Count == 0)
        {
          $("#mem1").css("color", "purple");
          $("#mem1").text("SUPER MARIO ODYSSEY");
          $("#p1").text("This game is my favorite video game of all time. The movement is such an upgrade from previous entries in the mainline Mario series, and offer so many more options for exploration, in adition to the capture mechanic expanding your moveset even further. Exploring the worlds of this game is nonstop fun, truly feeling like a globe-trotting adventure from start to finish. The developers managed to create an expirience that has become so resonant for so many people, including myself.");
          mem1Count = 1; 
        }
        else if (mem1Count == 1)
        {
          $("#mem1").css("color", "purple");
          $("#mem1").text("Game 1");
          $("#p1").text("More about this Game");
          mem1Count = 0; 
        }
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "blue");
        $("#mem2").text("SUPER MARIO GALAXY");
        $("#p2").text("While consensus on this game is slightly more divisive than Odyssey, I do not think that is a reflection of its quality, simply a natural shift in perception with time. Mario Galaxy is undoubtedly one of the most influential games in the Mario franchise, and people certainly recognized that upon initial release. The problems began with its sequel, 'SUPER MARIO GALAXY 2,' in which developers doubled down on the often questioned more linear design of Galaxy. The series was known for embracing its expansive, adaptive environments players were meant to explore and discover secrets within. However Galaxy often places the player in obstacle courses -- albeit very well designed obstacle courses -- that, while fun, was a questionable departure for the franchise. With the release of the sequel, then followed by SUPER MARIO 3D LAND, and SUPER MARIO 3D WORLD, it started to feel like GALAXY 1 had sparked a shift in design priorities from Mario developers. And while the design formula in 3D LAND and WORLD was indeed less-preferable when compared to the more traditional openly designed stages we saw in MARIO 64 and MARIO SUNSHINE, GALAXY on its own is a masterclass in video game design. It's fast-paced with tight controls, some of the most flawless level and environment design, and a gorgeous live soundtrack. SUPER MARIO GALAXY's linear stages are not a regression or a downgrade, they are a welcome change that makes SUPER MARIO GALAXY in isolation singlehandedly the most poignant, heartfelt and impactful Mario game of all time. ");
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "green");
        $("#mem3").text("MARIO BROS. WONDER");
        $("#p3").text("This game is incredible. The concept alone is enough to make this game incredible but the execution and creativity on display is (no pun intended) wonderful. The only valid criticism I’ve heard surrounding this game is the lack of enough boss battles, and the loss of unique character abilities. But A) frankly, I for one don’t play Mario games for the boss battles, and the scope of the standard stages in this game more than makes up for it. And B) I would argue that the lack of unique character abilities – while unfortunate, yes – is a welcomed change if it means we get more playable character options with greater accessibility for beginners. I would make the argument that this is the best 2D mario game we’ve gotten up to this point. The only games that come close are SUPER MARIO WORLD and MARIO BROS. 3, but MARIO WONDER certainly has more polish. ");
      });

      // ======================== Button #4
      $("#mem4-button").click(function () {
        $("#honMen").css("color", "green");
        $("#honMen").text("SUPER MARIO MAKER 2");
        $("#p4").text("The games I always found myself being drawn to as a kid were those of the creative variety. I loved games that allowed my imagination to run wild. It’s why I fell in love with the freedom that SUPER MARIO ODYSSEY provides the player through the movement, and it’s why Super Mario Maker remains one of my favorite games of all time to this day. I think most kids who played Mario imagined what it would be like to create their own levels. In this game, Nintendo not only provides that to the player, but makes it consistently engaging and fun. While the original MARIO MAKER on the Wii U is certainly a better fit for the console – the GamePad being a perfect interface for the game – the sequel on Switch simply provides more options and streamlines the online experience, giving the player even more freedom than before. ");
      });
